name: Job Submission Ingestion
on:
  issues:
    types: [opened]

concurrency:
  group: job-submission-pipeline
  cancel-in-progress: false

jobs:
  ingest-job:
    if: contains(github.event.issue.labels.*.name, 'job-submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-genai
        
      - name: Run Data Clerk Parser
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # We redirect output to a log file so we can parse it later
        run: |
          python3 parser.py "${{ github.event.issue.body }}" > run.log
          cat run.log

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Feat: Add batch jobs from Issue #${{ github.event.issue.number }}"
          title: "Review: Batch Job Submission #${{ github.event.issue.number }}"
          body: "Automated ingestion from Issue #${{ github.event.issue.number }}. Please review the updated jobs.json."
          branch: "add-job-${{ github.event.issue.number }}"
          add-paths: jobs.json
          assignees: koronkowy
          
      - name: Comment on Issue
        if: always() # Ensures this runs even if the parser or PR creation has issues
        run: |
          # Use sed to extract lines between our custom markers
          FAILURES=$(sed -n '/FAILED_URLS_START/,/FAILED_URLS_END/p' run.log | sed '1d;$d')
          
          if [ ! -z "$FAILURES" ]; then
            COMMENT="⚠️ Batch processing complete, but some jobs failed:
            
            $FAILURES
            
            Please check these links manually and submit them again if needed. The successful jobs are in the Pull Request below."
          else
            COMMENT="Batch processing complete! All jobs added successfully. Please review the Pull Request for final approval."
          fi
          
          gh issue comment ${{ github.event.issue.number }} --body "$COMMENT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}