name: Job Submission Ingestion
on:
  issues:
    types: [opened]

concurrency:
  group: job-submission-pipeline
  cancel-in-progress: false

jobs:
  ingest-job:
    if: contains(github.event.issue.labels.*.name, 'job-submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-genai
        
      - name: Run Data Clerk Parser
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Pass the entire issue body directly to the parser
          # The parser now handles reading jobs.json, appending, and saving
          python3 parser.py "${{ github.event.issue.body }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Feat: Add batch jobs from Issue #${{ github.event.issue.number }}"
          title: "Review: Batch Job Submission #${{ github.event.issue.number }}"
          body: "Automated ingestion from Issue #${{ github.event.issue.number }}. Please review the updated jobs.json."
          branch: "add-job-${{ github.event.issue.number }}"
          add-paths: jobs.json
          assignees: koronkowy
          
      - name: Comment on Issue
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Batch processing complete! Please review the linked Pull Request for final approval."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}