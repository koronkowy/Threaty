name: Job Submission Ingestion
on:
  issues:
    types: [opened]

concurrency:
  group: job-submission-pipeline
  cancel-in-progress: false

jobs:
  ingest-job:
    # Only run if the issue has the 'job-submission' label
    if: contains(github.event.issue.labels.*.name, 'job-submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-genai
        
      - name: Run Data Clerk Parser
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 1. Extract the first URL found in the issue body
          URL=$(grep -oE 'https?://[a-zA-Z0-9./?=_-]+' <<< "${{ github.event.issue.body }}" | head -n 1)
          
          # 2. Run the parser and capture output
          python3 parser.py "$URL" > raw_job.json
          
          # 3. Calculate the next ID
          # Reads the last ID from jobs.json, adds 1
          LAST_ID=$(jq '.[-1].id' jobs.json | tr -d '"')
          NEXT_ID=$((LAST_ID + 1))
          
          # 4. Inject the NEXT_ID into the new job object
          jq --arg id "$NEXT_ID" '.id = $id' raw_job.json > new_job_temp.json
          
          # 5. Append to jobs.json
          sed -i '$d' jobs.json
          echo "," >> jobs.json
          cat new_job_temp.json >> jobs.json
          echo "]" >> jobs.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Feat: Add new job from Issue #${{ github.event.issue.number }}"
          title: "Review: New Job Submission #${{ github.event.issue.number }}"
          body: "Automated ingestion from Issue #${{ github.event.issue.number }}. Please review the JSON data."
          branch: "add-job-${{ github.event.issue.number }}"
          add-paths: jobs.json
          assignees: koronkowy
          
      - name: Comment on Issue
        run: |
          # Capture the JSON data to include in the comment
          JSON_DATA=$(cat new_job_temp.json)
          COMMENT_BODY="Job processed successfully! Here is the data extracted:

          \`\`\`json
          $JSON_DATA
          \`\`\`
          
          Please review the Pull Request for final approval."
          
          gh issue comment ${{ github.event.issue.number }} --body "$COMMENT_BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}